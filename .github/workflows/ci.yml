name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend tests (pytest + RLS contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations + seed to local stack
        run: supabase db reset --no-seed

      - name: Install backend deps
        run: pip install -e ".[dev]"

      - name: Run pytest (RLS contracts + unit + integration, smoke excluded)
        run: pytest

      - name: Stop Supabase stack
        if: always()
        run: supabase stop --no-backup

  frontend-test:
    name: Frontend tests (typecheck + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build

  eval-gate:
    name: AI eval gate (categorization + chat extraction + multi-hop)
    runs-on: ubuntu-latest
    # Gated behind backend-test: the eval is the only CI step that costs
    # real money (~195 Anthropic + Gemini calls), so a PR that can't even
    # pass unit tests shouldn't trigger a paid run. NOT gated on
    # frontend-test — frontend has no bearing on AI accuracy, so a flaky
    # vitest run must not block the eval.
    needs: [backend-test]
    # Path-filtered: evals are expensive, so they only run when prompt or
    # agent code — the things that move accuracy — actually changed. The
    # paths-filter step below makes the whole job a no-op otherwise.
    # push-to-main is excluded; the gate's job is to block a regression
    # before it merges, not after.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check whether eval-relevant paths changed
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            evals:
              - 'app/prompts/**'
              - 'app/agent/**'
              - 'app/integrations/gemini.py'
              - 'evals/**'
              - 'eval.py'
              - 'scripts/_eval_setup.py'

      - name: Set up Python
        if: steps.changed.outputs.evals == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Supabase CLI
        if: steps.changed.outputs.evals == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        if: steps.changed.outputs.evals == 'true'
        run: supabase start

      - name: Apply migrations to local stack
        if: steps.changed.outputs.evals == 'true'
        run: supabase db reset --no-seed

      - name: Install backend deps
        if: steps.changed.outputs.evals == 'true'
        run: pip install -e ".[dev]"

      - name: Seed eval fixtures
        if: steps.changed.outputs.evals == 'true'
        env:
          # SUPABASE_URL is read by app.auth's JWKS client; the eval JWT
          # is minted against the same local stack scripts/_eval_setup
          # discovers via `supabase status`.
          EVAL_USER_PASSWORD: ${{ secrets.EVAL_USER_PASSWORD }}
        run: python scripts/seed_eval_fixtures.py

      - name: Run eval gate
        if: steps.changed.outputs.evals == 'true'
        env:
          # Separate keys from prod, with a tight monthly quota set in
          # the Anthropic / Google dashboards (the dashboard is the
          # authoritative budget — not a number in CI).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_EVAL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_EVAL }}
          GEMINI_MODEL_DEFAULT: gemini-2.5-flash
          EVAL_USER_PASSWORD: ${{ secrets.EVAL_USER_PASSWORD }}
          # LLM-as-judge dashboard (multi_hop, non-gating). A stronger
          # grader than the Haiku student; ~20 short Sonnet calls per
          # eval-relevant PR, billed on the eval Anthropic key. Set
          # EVAL_JUDGE=0 here to disable without code change.
          ANTHROPIC_JUDGE_MODEL: claude-sonnet-4-6
        run: python eval.py --eval=all

      - name: Upload per-run eval JSON
        if: steps.changed.outputs.evals == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-run
          path: evals/runs/*.json
          if-no-files-found: warn

      - name: Stop Supabase stack
        if: steps.changed.outputs.evals == 'true' && always()
        run: supabase stop --no-backup

  migrate-prod:
    name: Apply migrations to prod Supabase
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to prod project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

  deploy-frontend:
    name: Deploy frontend to Vercel (prod)
    needs: [backend-test, frontend-test, migrate-prod]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Source-upload deploy: CI uploads the source tree from the REPO
      # ROOT (note the working-directory override below), and Vercel
      # appends its project-side `Root Directory = frontend` setting,
      # landing on the right path. Running from `frontend/` here would
      # double the prefix (`frontend/frontend`) because Vercel always
      # joins its own Root Directory onto whatever you upload.
      #
      # Vercel runs `npm install` + `vite build` on their servers, where
      # project env vars (VITE_SUPABASE_URL, etc.) are in scope natively
      # at build time. The earlier `--prebuilt` flow ran `vercel build`
      # on the GitHub runner, which hit two failure modes: empty env
      # vars when the Vercel side didn't have them set, and `spawn sh
      # ENOENT` inside `vercel build` on the runner shell. Building
      # server-side eliminates both. CI still gates the deploy via the
      # `needs:` chain above — tests must pass before this step runs.
      - name: Deploy to Vercel (Vercel builds server-side)
        working-directory: .
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  e2e-deployed:
    name: E2E (Playwright against deployed prod)
    needs: [deploy-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    # Day 28 launch gate — exercises the five §13.5 golden-path flows
    # against the live PWA + Railway + prod Supabase. Hard-gated on
    # `scripts/smoke_prod.py` as a sanity pre-check so a broken deploy
    # fails fast before Playwright spins up.
    env:
      # Deployed prod URL — also reused by Playwright as baseURL.
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      # Reused by both scripts/smoke_prod.py and scripts/e2e_user.py.
      SMOKE_API_URL: ${{ secrets.SMOKE_API_URL }}
      SMOKE_SUPABASE_URL: ${{ secrets.SMOKE_SUPABASE_URL }}
      SMOKE_SUPABASE_ANON_KEY: ${{ secrets.SMOKE_SUPABASE_ANON_KEY }}
      # Persistent smoke user — created once in the Supabase dashboard
      # per the smoke_prod.py docstring.
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      # Service-role key — only used by scripts/e2e_user.py (sanctioned
      # caller under scripts/, excluded from the leak-guard). Mirrors
      # the SMOKE_* namespacing of the other secrets the script reads
      # so the prod value can't collide with the local-stack
      # `supabase-demo` service-role key the Supabase CLI plants in
      # developer .env files.
      SMOKE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Re-exposed under VITE_* so the Playwright helper can hit the
      # Supabase REST auth endpoint with the same anon key the deployed
      # PWA uses.
      VITE_SUPABASE_URL: ${{ secrets.SMOKE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SMOKE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps (for smoke_prod.py + e2e_user.py)
        run: pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Railway has "Wait for CI" on (memory.md 2026-05-22), so the new
      # image is rolling out when this job starts. Poll /healthz until
      # we see a 200 from the app (not the x-railway-fallback "train
      # has not arrived" page). 5-minute ceiling.
      #
      # `curl -w "%{http_code}"` writes ONLY the status code (no
      # newlines, no multi-line JSON), so `$status` stays simple and
      # the `= "200"` check works. `-D /tmp/h` dumps headers to a
      # file so we can grep for the x-railway-fallback marker in the
      # SAME GET request — separate `curl -sI` would issue a HEAD
      # which `/healthz` rejects (405).
      - name: Wait for Railway healthcheck
        env:
          HEALTHCHECK_URL: ${{ secrets.SMOKE_API_URL }}/healthz
        run: |
          for attempt in $(seq 1 30); do
            status=$(curl -s -o /dev/null -D /tmp/healthz.headers -w "%{http_code}" "$HEALTHCHECK_URL" || echo "000")
            if [ "$status" = "200" ] && ! grep -qi "x-railway-fallback: true" /tmp/healthz.headers 2>/dev/null; then
              echo "✓ Railway live after ${attempt} attempt(s)"
              exit 0
            fi
            echo "· attempt ${attempt}: status=${status}; retrying in 10s"
            sleep 10
          done
          echo "✗ Railway healthcheck never returned 200 within 5 min" >&2
          exit 1

      - name: Smoke (scripts/smoke_prod.py)
        run: python scripts/smoke_prod.py

      # Mint the per-run E2E user. Captures the three KEY=VALUE lines
      # the script prints to stdout into $GITHUB_ENV so subsequent
      # steps see them.
      - name: Mint E2E user
        id: mint
        run: |
          # Redirect creds to a tempfile — DO NOT pipe through `tee` or
          # `cat` them. The values are live prod credentials for the
          # ~5 minutes between this step and the teardown step at the
          # end of the job; anything echoed here lands in the run log
          # and any actor with read access to the run can grab them
          # before teardown fires. The `::add-mask::` directive scrubs
          # each value from *all subsequent* log output (set-env,
          # `set -x` traces, accidental `echo $E2E_TEST_PASSWORD`).
          # `mask` must happen BEFORE the value first appears in the
          # log, which is why we read the file line-by-line and emit
          # the mask directive immediately on each capture.
          set +x
          python scripts/e2e_user.py create > /tmp/e2e_user.env
          while IFS='=' read -r key value; do
            case "$key" in
              E2E_TEST_EMAIL|E2E_TEST_PASSWORD|E2E_USER_ID)
                echo "::add-mask::$value"
                ;;
            esac
          done < /tmp/e2e_user.env
          # Promote each KEY=VALUE line into $GITHUB_ENV (consumed by
          # the Playwright step via process.env) and stash the user_id
          # as a step output (consumed by the teardown step's `if:`).
          # The values are masked, so the echoes that GitHub Actions
          # generates when writing to $GITHUB_ENV / $GITHUB_OUTPUT
          # come out as `***` in the log.
          set -a
          source /tmp/e2e_user.env
          set +a
          {
            echo "E2E_TEST_EMAIL=$E2E_TEST_EMAIL"
            echo "E2E_TEST_PASSWORD=$E2E_TEST_PASSWORD"
          } >> "$GITHUB_ENV"
          echo "user_id=$E2E_USER_ID" >> "$GITHUB_OUTPUT"
          # Defense in depth — wipe the tempfile so a misconfigured
          # actions/upload-artifact step on /tmp can't ship it.
          rm -f /tmp/e2e_user.env

      - name: Run Playwright (deployed)
        working-directory: frontend
        run: npm run e2e:deployed

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      # Always-run teardown — a Playwright failure must not leak the
      # E2E user. The script is best-effort (404 on already-deleted is
      # not an error) so a re-run of this step is safe.
      - name: Delete E2E user
        if: always() && steps.mint.outputs.user_id != ''
        run: python scripts/e2e_user.py delete --user-id="${{ steps.mint.outputs.user_id }}"

  lighthouse:
    name: Lighthouse (PWA gate ≥ 90; performance recorded)
    needs: [deploy-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    # PWA score is the gate per DESIGN.md §10.1. Performance is recorded
    # as a target (Day 28 review — Lighthouse perf on CI runners varies
    # ±5 on the same code, so gating it produces flake without value).
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Same healthcheck shape as the e2e-deployed job — see that step's
      # comment for the curl-options rationale. /healthz is GET-only
      # (`@app.get("/healthz")`); a HEAD request returns 405, so we use
      # GET and capture status + headers in one shot.
      - name: Wait for Railway healthcheck
        env:
          HEALTHCHECK_URL: ${{ secrets.SMOKE_API_URL }}/healthz
        run: |
          for attempt in $(seq 1 30); do
            status=$(curl -s -o /dev/null -D /tmp/healthz.headers -w "%{http_code}" "$HEALTHCHECK_URL" || echo "000")
            if [ "$status" = "200" ] && ! grep -qi "x-railway-fallback: true" /tmp/healthz.headers 2>/dev/null; then
              echo "✓ Railway live after ${attempt} attempt(s)"
              exit 0
            fi
            echo "· attempt ${attempt}: status=${status}; retrying in 10s"
            sleep 10
          done
          echo "✗ Railway healthcheck never returned 200 within 5 min" >&2
          exit 1

      - name: Run Lighthouse against deployed PWA
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ secrets.E2E_BASE_URL }}
          uploadArtifacts: true
          temporaryPublicStorage: false
          # PWA ≥ 90 is the only hard assertion (DESIGN.md §10.1). The
          # Day 28 review noted that performance ≥ 80 is too flaky for
          # a hard gate, so we record but don't enforce it; the score
          # surfaces in the run log + uploaded artifact.
          configPath: ./.github/lighthouse/config.json
