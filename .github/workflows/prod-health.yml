name: Prod health

# Scheduled prod-health check — the detector for the failure class that
# push/PR CI is structurally blind to: prod breaking BETWEEN deploys.
# memory.md records a Railway platform outage that took prod offline with
# zero code change; nothing in ci.yml would have fired. Tameru leans on
# five external services (Supabase, Anthropic, Gemini, Resend,
# Vercel/Railway) — any can fail or change on its own timeline. This
# workflow runs the same golden-path checks ci.yml runs after a deploy,
# but on a timer against already-live prod, decoupled from any push.
#
# Distinct from ci.yml's e2e-deployed job (which is `needs: deploy-frontend`
# and only fires on push to main). This one has no deploy dependency.

on:
  # Daily, 11:00 UTC (off-peak; deliberately not Monday 14:00 UTC, which
  # is the weekly-digest cron — keep the two clear of each other in logs).
  # One run/day stays inside the "~10/week E2E ephemeral-user" PostHog-noise
  # envelope from memory.md (2026-05-28). Tune the cron freely.
  schedule:
    - cron: "0 11 * * *"
  # Hand-trigger for on-demand "is prod healthy right now?" checks.
  workflow_dispatch:

# Two runs (a manual dispatch overlapping the scheduled fire) must not
# double-mint the ephemeral user. Don't cancel a check already in flight.
concurrency:
  group: prod-health
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  health:
    name: Prod health (smoke + deployed E2E)
    runs-on: ubuntu-latest
    # Inherits the same prod secrets as ci.yml's e2e-deployed job. The
    # `production` environment has no protection rules, so a scheduled run
    # references it without stalling on a required-reviewer gate.
    environment: production
    env:
      # Deployed prod URL — also reused by Playwright as baseURL.
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      # Reused by both scripts/smoke_prod.py and scripts/e2e_user.py.
      SMOKE_API_URL: ${{ secrets.SMOKE_API_URL }}
      SMOKE_SUPABASE_URL: ${{ secrets.SMOKE_SUPABASE_URL }}
      SMOKE_SUPABASE_ANON_KEY: ${{ secrets.SMOKE_SUPABASE_ANON_KEY }}
      # Persistent smoke user — created once in the Supabase dashboard
      # per the smoke_prod.py docstring.
      SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
      # Service-role key — only used by scripts/e2e_user.py (sanctioned
      # caller under scripts/, excluded from the leak-guard). SMOKE_*
      # namespaced so the prod value can't collide with the local-stack
      # service-role key the Supabase CLI plants in developer .env files.
      SMOKE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Re-exposed under VITE_* so the Playwright helper can hit the
      # Supabase REST auth endpoint with the same anon key the deployed
      # PWA uses.
      VITE_SUPABASE_URL: ${{ secrets.SMOKE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SMOKE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps (for smoke_prod.py + e2e_user.py)
        run: pip install -e ".[dev]"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Unlike ci.yml's e2e-deployed (where this waits for a rollout), here
      # the poll IS the outage detector: nothing is deploying, so a prod
      # that never returns 200 within 5 min is exactly the Railway-down
      # case this workflow exists to catch. /healthz is GET-only
      # (`@app.get("/healthz")`); a HEAD request returns 405, so we GET and
      # capture status + headers in one shot. `-w "%{http_code}"` writes
      # ONLY the status code (no newlines) so `$status` stays simple; `-D`
      # dumps headers so we can grep for Railway's x-railway-fallback "train
      # has not arrived" marker from the SAME request.
      - name: Wait for Railway healthcheck
        env:
          HEALTHCHECK_URL: ${{ secrets.SMOKE_API_URL }}/healthz
        run: |
          for attempt in $(seq 1 30); do
            status=$(curl -s -o /dev/null -D /tmp/healthz.headers -w "%{http_code}" "$HEALTHCHECK_URL" || echo "000")
            if [ "$status" = "200" ] && ! grep -qi "x-railway-fallback: true" /tmp/healthz.headers 2>/dev/null; then
              echo "✓ Railway live after ${attempt} attempt(s)"
              exit 0
            fi
            echo "· attempt ${attempt}: status=${status}; retrying in 10s"
            sleep 10
          done
          echo "✗ Railway healthcheck never returned 200 within 5 min" >&2
          exit 1

      - name: Smoke (scripts/smoke_prod.py)
        run: python scripts/smoke_prod.py

      # Mint the per-run E2E user. Captures the three KEY=VALUE lines the
      # script prints to stdout into $GITHUB_ENV so subsequent steps see
      # them. Same masking discipline as ci.yml's e2e-deployed job: the
      # values are live prod credentials for the ~5 minutes until teardown,
      # so `::add-mask::` is emitted on each capture BEFORE the value first
      # appears in the log.
      - name: Mint E2E user
        id: mint
        run: |
          set +x
          python scripts/e2e_user.py create > /tmp/e2e_user.env
          while IFS='=' read -r key value; do
            case "$key" in
              E2E_TEST_EMAIL|E2E_TEST_PASSWORD|E2E_USER_ID)
                echo "::add-mask::$value"
                ;;
            esac
          done < /tmp/e2e_user.env
          set -a
          source /tmp/e2e_user.env
          set +a
          {
            echo "E2E_TEST_EMAIL=$E2E_TEST_EMAIL"
            echo "E2E_TEST_PASSWORD=$E2E_TEST_PASSWORD"
          } >> "$GITHUB_ENV"
          echo "user_id=$E2E_USER_ID" >> "$GITHUB_OUTPUT"
          rm -f /tmp/e2e_user.env

      - name: Run Playwright (deployed)
        working-directory: frontend
        run: npm run e2e:deployed

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      # Always-run teardown — a Playwright failure must not leak the E2E
      # user. Best-effort (404 on already-deleted is not an error).
      - name: Delete E2E user
        if: always() && steps.mint.outputs.user_id != ''
        run: python scripts/e2e_user.py delete --user-id="${{ steps.mint.outputs.user_id }}"

  notify:
    name: Open issue on failure
    needs: [health]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      # A red scheduled run nobody sees is worthless. GitHub emails the
      # repo owner on scheduled-workflow failure by default; this step adds
      # a durable, in-repo record. Deduped: while prod stays broken, we
      # comment on the existing open issue instead of opening a new one
      # each day. No new secret, no external vendor.
      - name: Create or update prod-health-failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'prod-health-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Scheduled **prod-health** check failed — prod may be down or a golden path broke.',
              '',
              `- Run: ${runUrl}`,
              `- Trigger: \`${context.eventName}\``,
              `- Time (UTC): ${new Date().toISOString()}`,
              '',
              'Check the failing step (healthcheck poll = outage; smoke/Playwright = app-level break) and the uploaded Playwright report artifact.',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Prod health check failed',
                labels: [label],
                body,
              });
            }
