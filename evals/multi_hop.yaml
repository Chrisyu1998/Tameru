# Multi-hop eval — 20 hand-curated chat prompts. Day 22 (DESIGN.md §7.10).
#
# Each row runs through the full agent loop (run_turn). Scored on:
#   * tool sequence — does the agent call a sensible set of tools?
#     (gate 85% / target 90%). `sequence_match: unordered` (default) is a
#     multiset subset match: every expected step must be matched by some
#     distinct actual tool call. `ordered` requires a strict prefix.
#   * final answer — `answer_pattern` (regex) and/or `expected_answer_value_usd`
#     within `answer_value_tolerance_usd` (target 95%, no gate). The value
#     check passes if ANY dollar figure in the prose lands within tolerance.
#
# Per row: `difficulty` (easy|medium|hard) and `tags` drive the diagnostic
# breakdown in the eval summary — they do not affect the gate.
#
# Fixture data (scripts/_eval_setup) — totals the expected values depend on:
#   Dining:        Jan $150 / Feb $200 / Mar $250
#   Groceries:     Feb $280 / Mar $300
#   Coffee Shops:  Feb $35  / Mar $40   (all on the Amex Gold fixture card)
#   Subscriptions: Netflix $15.99/mo + Spotify $9.99/mo = $25.98/mo
#   March all-category total: $250 + $300 + $40 = $590
# If you change the fixture totals, update the expected values below.
#
# Coverage: cross-month deltas, category combine, category × card,
# generative charts, subscription queries, chat-based disambiguation,
# graceful no-data, and multilingual (>=2 zh-TW + >=2 ja-JP per §7.7).

# --- cross-month deltas ----------------------------------------------------
- prompt: "How much more did I spend on dining in March vs February?"
  difficulty: medium
  tags: [cross-month-delta]
  expected_tool_sequence:
    - name: calculate_total
      args_must_include: { category: "Dining", date_from: "2026-03-01" }
    - name: calculate_total
      args_must_include: { category: "Dining", date_from: "2026-02-01" }
  sequence_match: unordered
  answer_pattern: "(more|less|increase|decrease|higher|lower)"
  expected_answer_value_usd: 50.00
  answer_value_tolerance_usd: 1.00

- prompt: "Did my grocery spending go up from February to March?"
  difficulty: medium
  tags: [cross-month-delta]
  expected_tool_sequence:
    - name: calculate_total
      args_must_include: { category: "Groceries", date_from: "2026-02-01" }
    - name: calculate_total
      args_must_include: { category: "Groceries", date_from: "2026-03-01" }
  sequence_match: unordered
  answer_pattern: "(up|increase|more|higher|yes)"
  expected_answer_value_usd: 20.00
  answer_value_tolerance_usd: 1.00

- prompt: "Compare my dining spend in January versus March."
  difficulty: medium
  tags: [cross-month-delta]
  expected_tool_sequence:
    - name: calculate_total
      args_must_include: { category: "Dining", date_from: "2026-01-01" }
    - name: calculate_total
      args_must_include: { category: "Dining", date_from: "2026-03-01" }
  sequence_match: unordered
  answer_pattern: "(more|less|increase|decrease|higher|lower)"
  expected_answer_value_usd: 100.00
  answer_value_tolerance_usd: 1.00

# --- category combine ------------------------------------------------------
- prompt: "What's my combined spend on dining and groceries in March?"
  difficulty: medium
  tags: [category-combine]
  expected_tool_sequence:
    - name: calculate_total
      args_must_include: { category: "Dining", date_from: "2026-03-01" }
    - name: calculate_total
      args_must_include: { category: "Groceries", date_from: "2026-03-01" }
  sequence_match: unordered
  answer_pattern: "\\$\\d"
  expected_answer_value_usd: 550.00
  answer_value_tolerance_usd: 1.00

