# --- chat-based disambiguation ---------------------------------------------
# Args are deliberately NOT pinned: "find that ~$8 Blue Bottle coffee" can
# be filtered correctly via merchant_contains, OR category + amount range,
# OR a merchant substring — all valid. The row asserts the agent reaches
# for the retrieval tool to disambiguate, not which filter it picks.
