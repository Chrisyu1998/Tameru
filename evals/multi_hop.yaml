# --- spending summary ------------------------------------------------------
# "March" is a specific past month — get_spending_summary must be given
# an explicit date_from/date_to window (the trailing `months` window
# can't isolate it). Pinning date_from asserts the agent computed the
# range rather than defaulting to the current month.
- prompt: "What was my biggest spending category in March, and roughly how much?"
  difficulty: medium
  tags: [spending-summary]
  expected_tool_sequence:
    - name: get_spending_summary
      args_must_include: { date_from: "2026-03-01" }
  sequence_match: unordered
  answer_pattern: "[Gg]roceries"
  expected_answer_value_usd: 300.00
  answer_value_tolerance_usd: 5.00

# A single "total" (not a breakdown) — calculate_total with no category
# filter and an explicit March window is the right tool.
- prompt: "Give me my total spending across all categories in March."
  difficulty: medium
  tags: [spending-summary]
  expected_tool_sequence:
    - name: calculate_total
      args_must_include: { date_from: "2026-03-01" }
  sequence_match: unordered
  answer_pattern: "\\$\\d"
  expected_answer_value_usd: 590.00
  answer_value_tolerance_usd: 2.00

