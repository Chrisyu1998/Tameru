# Chat-extraction eval — 61 hand-curated rows. Day 22 (DESIGN.md §7.10).
#
# Each row is a user chat message. The runner feeds `user_message`
# through the full agent loop (run_turn) and inspects the first proposer
# tool_use block. Two proposers are gated:
#
#   * propose_transaction (51 rows) — scored on amount accuracy
#     (gate 93% / target 95%) and merchant accuracy (target 90%, no gate).
#   * propose_subscription (10 rows) — scored as a single per-row pass
#     rate (gate 85% / target 90%); all args_must_include fields must
#     match. The pg_cron auto-logger amplifies any frequency/start_date
#     error monthly, so subscription rows are metered holistically.
#
# IMPORTANT — every propose_transaction row carries an explicit time
# reference ("today", "just now", "this morning", "yesterday", "last
# Friday", ...). `propose_transaction` requires a `date` arg, and the
# chat system prompt tells the agent NOT to fabricate dates — so a
# dateless message makes the agent (correctly) ask "when was this?"
# instead of proposing, which an extraction eval can't score. A complete
# utterance is what tests extraction. The runner does not assert the
# `date` value itself; the anchor just guarantees a proposal happens.
#
# propose_card is intentionally NOT in this corpus — it fires rarely, the
# parse-card UI catches most extraction errors, and UAT (Day 28) covers
# it. See DESIGN.md §7.10.
#
# Per row: `difficulty` (easy|medium|hard) and optional `tags` drive the
# diagnostic breakdown in the eval summary — they do not affect the gate.
#
# `card_name_resolves_to` is matched by the runner against the seeded
# fixture cards (scripts/_eval_setup._FIXTURE_CARDS): "Amex Gold",
# "Chase Sapphire Reserve", "Chase Freedom Unlimited". Merchant matching
# is case-insensitive substring containment.
#
# Multilingual coverage (DESIGN.md §7.7 line 689): 3 zh-TW + 3 ja-JP
# rows, distributed across both proposers. v1 chat languages: en-US,
# zh-TW, ja-JP.

# ===========================================================================
