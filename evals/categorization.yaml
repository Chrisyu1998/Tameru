# Categorization eval — 14-row skeleton, one per non-Other v2 category
# (full 100 lands on Day 22).
#
# Shape: (merchant, amount) -> expected_category. Amount is a string so
# decimal precision is preserved through YAML parse; the runner converts
# to Decimal before calling categorize().
#
# Criteria for picking rows: each row should disambiguate against the
# nearest-neighbor category (Starbucks = Coffee Shops not Dining; Uber =
# Transit not Travel; CVS = Drugstores not Health). The full 100 on Day
# 22 should deepen coverage — multiple merchants per category, price
# ranges, ambiguous cases like airport Starbucks.

