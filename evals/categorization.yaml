# Categorization eval — 114 hand-curated rows: 98 base (7 per non-Other
# v5 category × 14 categories) + 16 edge cases. Day 22 (DESIGN.md §7.10).
#
# Shape: (merchant, amount) -> expected_category, plus diagnostic
# `difficulty` (easy|medium|hard) and optional `tags`. Amount is a string
# so decimal precision survives YAML parse; the runner converts to
# Decimal for inspection but does NOT pass amount to categorize()
# (categorize_v3 dropped amount — see app/prompts/categorize.py).
#
# `difficulty` / `tags` do not affect the CI gate — they drive the
# per-tier breakdown in the eval summary so a regression can be localized
# ("we regressed on hard edge-case rows" vs one flat percentage).
#
# Curation criteria:
#   * Each row disambiguates against the nearest-neighbor category
#     (Starbucks = Coffee Shops not Dining; CVS = Drugstores not Health).
#   * `easy` = unambiguous brand; `medium` = needs the taxonomy to
#     resolve; `hard` = a genuine trap (the 16 edge cases).
#   * Categories follow categorize_v5: `Memberships` (not "Subscriptions"),
#     `Streaming` as its own bucket. No row uses `Other`.
#
# Refresh cadence: monthly, mining `merchant_category` corrections.

